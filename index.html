<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SplitSmart</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h1>SplitSmart 💸</h1>
    <button id="toggleTheme" class="theme-btn">🌙</button>
  </div>

  <!-- INPUT SECTION -->
  <div class="input-section">
    <input id="name" placeholder="Person name">
    <input id="amount" type="number" placeholder="Amount">
    <button id="addBtn">Add</button>
  </div>

  <!-- LIST -->
  <ul id="expenseList"></ul>

  <!-- PROGRESS (optional but used in JS) -->
  <div id="progress"></div>

  <!-- RESULT (VERY IMPORTANT) -->
  <div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
